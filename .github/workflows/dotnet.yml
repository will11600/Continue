name: .NET Core CI/CD

on:
  push:
    branches: [master]

jobs:
  build-and-publish:
    permissions:
      id-token: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build Continue.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Continue.slnx --configuration Release --no-build --verbosity normal --logger "trx"

      - name: Pack
        run: dotnet pack Continue.slnx --configuration Release --no-build -o ./artifacts

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet push
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path ./artifacts -Filter *.nupkg -File
          if (-not $packages) {
            throw "No .nupkg files found in ./artifacts"
          }
          foreach ($package in $packages) {
            dotnet nuget push $package.FullName --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
